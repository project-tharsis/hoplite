# Arteta 6 Mental Models + 3D Assessment Framework — Canonical Rubric
# Machine-readable version of prompts/arteta_framework.md
# Python tooling reads this file for prompt building.

metadata:
  version: "1.0"
  created: "2026-05-18"
  description: "Arteta evaluation rubric: 6 mental models + 3 dimensions for Arsenal match analysis"
  source: "prompts/arteta_framework.md"
  language: zh

models:
  - id: "1"
    name: "culture_as_os"
    display_name: "文化是战术的操作系统"
    philosophy: "日常标准不对，战术不会稳定运行。"
    observable_features:
      - yellow_cards_for
      - red_cards_for
      - fouls_for
      - fouls_against
      - score_state_timeline
    positive_indicators:
      - "纪律良好：≤1黄牌"
      - "黄牌出现在合理时刻（如战术犯规）"
      - "犯规数可控"
      - "反抢积极"
    negative_indicators:
      - "红牌"
      - "2+黄牌且出现时机不当（开场/僵持时无谓吃牌）"
      - "犯规失控"
    weak_label_rules:
      - "red > 0 → 🔴 (high confidence)"
      - "yellow >= 4 → 🔴 (high confidence)"
      - "critical-time card (yellow >= 2 AND result == L) → 🔴 (high confidence)"
      - "fouls_delta >= 8 → 🔴 (high confidence)"
      - "yellow >= 2 → 🟡 (high confidence)"
      - "fouls_delta >= 4 → 🟡 (medium confidence)"
      - "otherwise → 🟢 (high confidence)"
    confidence_rules:
      - "Red card present → high"
      - "4+ yellow cards → high"
      - "Fouls data available → depends on delta magnitude"
      - "Fouls data missing → default high (cards still observable)"
    data_limitations:
      - "反抢投入度 unavailable (pressing_recoveries missing)"
      - "半场专注度 unavailable (no per-half discipline breakdown)"
    narrative_guidance: "领先7-0时89分钟的战术黄牌 ≠ 0-0时2分钟的鲁莽黄牌。结合比赛状态判断纪律质量。"

  - id: "2"
    name: "where_game_is_played"
    display_name: "控制比赛发生在哪里"
    philosophy: "控制不是只控球，是把比赛带到想要的区域、节奏和情绪。"
    observable_features:
      - possession_delta
      - shot_delta
      - xg_delta
      - pass_accuracy_delta
      - corner_delta
      - opponent_shots_on_target
    positive_indicators:
      - "控球≥55%"
      - "射门显著多于对手"
      - "xG碾压"
      - "传球成功率高"
      - "比赛在阿森纳想要的区域"
    negative_indicators:
      - "控球≤45%"
      - "射门少于对手"
      - "被锁在防守三区"
    weak_label_rules:
      - "shot_delta > 0 AND xg_delta > 0 → 🟢 (high)"
      - "xg missing but shot_delta > 0 AND possession_delta > 0 → 🟢 (medium)"
      - "shot_delta < 0 AND xg_delta < 0 AND corner_delta < 0 → 🔴 (high)"
      - "mixed signals (poss positive but shots negative) → 🟡 (medium)"
      - "some data but insufficient for green/red → 🟡 (medium)"
      - "very little data → 🟡 (low)"
    confidence_rules:
      - "xG + shots + possession all available → high"
      - "xG missing → medium (fallback to shots+possession)"
      - "Most metrics missing → low"
    data_limitations:
      - "xG missing from many sources"
      - "pressing unavailable"
      - "territory/zone data unavailable"
    narrative_guidance: "控球率高不等于控制比赛。需要结合射门质量和区域控制来判断阿森纳是否真的在主导比赛。"

  - id: "3"
    name: "defence_as_attacking_identity"
    display_name: "防守也是进攻身份"
    philosophy: "防守应为进攻创造平台——球员要'爱'防守。"
    observable_features:
      - goals_conceded
      - opponent_shots_on_target
      - xg_against
      - score_margin
    positive_indicators:
      - "零封"
      - "失≤1球且对手射正≤3"
      - "防守为进攻提供了平台"
    negative_indicators:
      - "失3+球"
      - "防守崩溃导致进攻被压缩"
    weak_label_rules:
      - "clean sheet → 🟢 (high)"
      - "1 conceded AND opp_sot <= 3 → 🟢 (high)"
      - "3+ conceded → 🔴 (high)"
      - "xg_against > 2.0 → 🔴 (medium)"
      - "1-2 conceded → 🟡 (high or medium depending on opp_sot)"
    confidence_rules:
      - "Clean sheet → high"
      - "opp_sot available → high"
      - "xg_against available → adds precision"
      - "xg_against missing → still high (goals conceded is primary)"
    data_limitations:
      - "pressing_recoveries unavailable"
      - "defensive actions breakdown unavailable"
    narrative_guidance: "防守不只是不失球。要判断防守是否为进攻创造了平台——高位反抢成功后快速反击是好防守转化为进攻的标志。"

  - id: "4"
    name: "marginal_gains"
    display_name: "边际收益要专家化"
    philosophy: "能决定比赛的部门要专家化——定位球/转换不能靠兼职。"
    observable_features:
      - set_piece_goals_for
      - set_piece_goals_against
      - corners_for
      - corners_against
    positive_indicators:
      - "定位球进球≥2"
      - "零定位球失球"
      - "角球有威胁"
    negative_indicators:
      - "定位球失球≥2"
      - "定位球进攻毫无威胁"
    weak_label_rules:
      - "set_piece_goals_for > set_piece_goals_against → 🟢 (high)"
      - "even but corner advantage > 3 → 🟢 (high)"
      - "set_piece_goals_against > set_piece_goals_for → 🔴 (high)"
      - "neutral → 🟡 (high)"
    confidence_rules:
      - "Set piece goals data available → high"
      - "Only corner counts available → medium"
    data_limitations:
      - "set piece xG unavailable"
      - "set piece delivery quality unavailable"
      - "pressing from set pieces unavailable"
    narrative_guidance: "定位球不只是进球数。要评估角球/任意球的威胁质量——即使没进球，如果每次角球都制造混乱，说明定位球教练组工作到位。"

  - id: "5"
    name: "add_capability_keep_identity"
    display_name: "加能力，但不要丢身份"
    philosophy: "保留传统优势，同时叠加新能力。"
    observable_features:
      - pass_accuracy_for
      - possession_for
      - result
      - arsenal_goals
      - xg_for
    positive_indicators:
      - "传统优势保留（传球≥85%、控球好）"
      - "新元素有效（多人进球、新阵型成功）"
    negative_indicators:
      - "传统优势丢失（传球差、控球被压制）"
    weak_label_rules:
      - "win AND pass_accuracy > 80% AND possession > 50% → 🟢 (high)"
      - "loss → 🔴 (high)"
      - "draw with poor control (PA<75 AND poss<45) → 🔴 (medium)"
      - "win but one metric below threshold → 🟡 (medium)"
      - "missing data → 🟡 (medium)"
      - "draw with acceptable control → 🟡 (medium)"
    confidence_rules:
      - "All metrics available → high"
      - "pass_accuracy or possession missing → medium"
    data_limitations:
      - "goal diversity (who scored) not directly available in features"
      - "formation/tactical changes not tracked"
    narrative_guidance: "多人进球说明体系运转良好，一人包办说明依赖个人能力。传统优势（控球、传球）不能因为叠加新战术而丢失。"

  - id: "6"
    name: "role_clarity"
    display_name: "人需要清晰度，不只是压力"
    philosophy: "替补要知道如何贡献，球员要角色清晰。"
    observable_features:
      - arsenal_sub_count
      - substitution_windows
      - goals_after_arsenal_subs
      - result
    positive_indicators:
      - "换人产生进球/助攻"
      - "替补融入体系"
      - "换人时机合理（45-75分钟）"
    negative_indicators:
      - "换人过晚（80'后且比分落后）"
      - "多次换人无效"
      - "替补明显脱节"
    weak_label_rules:
      - "no subs AND result == L → 🔴 (high)"
      - "no subs → 🟡 (medium)"
      - "earliest sub < 70' AND goals_after_subs > 0 → 🟢 (high)"
      - "latest sub > 80' AND goals conceded after subs → 🔴 (high)"
      - "subs present but unclear impact → 🟡 (medium)"
    confidence_rules:
      - "Substitution data available → depends on timing clarity"
      - "No substitutions made → medium"
    data_limitations:
      - "individual sub performance rating unavailable"
      - "tactical role of sub (like-for-like vs tactical shift) unknown"
    narrative_guidance: "换人不只是'谁上谁下'。要评估替补上场后是否清楚自己的角色——是加强防守还是寻找进球？角色清晰度决定换人效果。"

dimensions:
  - id: "execution"
    display_name: "赛前决策执行度"
    description: "对比 predicted_plan 与实际数据的匹配度"
    constituent_models: ["2", "4"]
    judgment_rules:
      - "stats 数据支持 predicted_plan 的方向 → 🟢"
      - "部分匹配 → 🟡"
      - "差距明显 → 🔴"
    evidence_requirement: "每个 focus_area 至少一条数据对应"

  - id: "adjustment"
    display_name: "赛中调整合理性"
    description: "换人时机与效果评估"
    constituent_models: ["6"]
    judgment_rules:
      - "换人直接产生进球 → 🟢"
      - "换人时机合理且比赛结果好 → 🟢"
      - "换人无效果但比赛已无悬念 → 🟡"
      - "换人过晚且结果差 → 🔴"
    evidence_requirement: "sub_impact 数据中的时机和效果"
    notes: "大比分领先时不做调整是合理的"

  - id: "satisfaction"
    display_name: "比赛结果满意度"
    description: "L1→L2→L3 层层递进的结果评估"
    constituent_models: ["1", "3", "5"]
    judgment_rules:
      - "L1: 赢强敌→🟢, 赢弱敌→🟡, 平强敌客场→🟢, 输弱敌→🔴, 输强敌→🟡"
      - "L2: 净胜≥3球自动🟢, 客场净胜≥2球→🟢, 净负≥4球→🔴"
      - "L3: 淘汰赛客场取胜→🟢"
    evidence_requirement: "opponent_quality, venue, competition_stage"

output_schema:
  overall_signal:
    type: "string"
    enum: ["🟢", "🟡", "🔴"]
    rule: "由三个 dimension_signals 投票决定（≥2个🟢 → 🟢, ≥2个🔴 → 🔴, 否则🟡）"
  model_signals:
    type: "object"
    keys: ["1", "2", "3", "4", "5", "6"]
    value_type: "string"
    value_enum: ["🟢", "🟡", "🔴"]
  dimension_signals:
    type: "object"
    keys: ["execution", "adjustment", "satisfaction"]
    value_type: "string"
    value_enum: ["🟢", "🟡", "🔴"]
  evidence:
    type: "object"
    description: "Per-model evidence dict — model_id → list of evidence strings"
    keys: ["1", "2", "3", "4", "5", "6"]
    value_type: "array"
    item_type: "string"
  confidence:
    type: "object"
    description: "Per-model confidence level"
    keys: ["1", "2", "3", "4", "5", "6"]
    value_type: "string"
    value_enum: ["high", "medium", "low"]
  missing_or_weak_evidence:
    type: "array"
    description: "List of data points that are missing or weak"
    item_type: "string"
  weak_label_disagreements:
    type: "array"
    description: "List of disagreements with weak labels — model_id, weak_signal, llm_signal, reason"
    item_type: "object"
  narrative:
    type: "string"
    description: "中文复盘正文 (300-400字)"

writing_style:
  language: "zh-CN (简体中文)"
  perspective: "客观第三人称，不用'我们'或'我'"
  format: "短句分行，口语化像聊天"
  terminology: "中英文术语不加空格（e.g. rest-defence, xG, inverted-fullback）"
  analysis: "分析为什么发生，不是只描述什么"
  tone: "引用 Arteta 的战术偏好但不扮演他"
  length: "300-400字中文"

narrative_structure:
  - "总体判断（1-2句，基于三维度综合信号）"
  - "战术执行（赛前决策执行度 + 预测方向匹配度）"
  - "关键节点（6模型中的高信号/低信号 + 具体事件）"
  - "改进方向（信号为🔴或🟡的模型的具体改进点）"
  - "一句话判决（结尾）"
